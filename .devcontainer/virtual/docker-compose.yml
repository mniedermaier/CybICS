services:
  attack-machine:
    image: mniedermaier1337/cybics-attack-machine:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/attack-machine
      dockerfile: Dockerfile
    hostname: attack-machine
    restart: "no"
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - 6081:6081
      - 5902:5902
    volumes:
      - ../../:/CybICS
      - ../../software/attack-machine/workspace:/root/Desktop/workspace
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.100
    depends_on:
      - openplc
      - fuxa
      - hwio
    profiles:
      - attack
      - full

  openplc:
    image: mniedermaier1337/cybicsopenplc:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/OpenPLC
      dockerfile: Dockerfile
    restart: "no"
    privileged: true
    ports:
      - 8080:8080
      - 502:502
      - 102:102
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.3

  opcua:
    image: mniedermaier1337/cybicsopcua:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/opcua
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 4840:4840
    depends_on:
    - openplc
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.5

  s7com:
    image: mniedermaier1337/cybicss7com:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/s7com
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 1102:1102
    depends_on:
    - openplc
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.6

  fuxa:
    image: mniedermaier1337/cybicsfuxa:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/FUXA
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 1881:1881
    depends_on:
    - openplc
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.4

  hwio:
    image: mniedermaier1337/cybicshwio:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/hwio-virtual
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 8090:8090
    depends_on:
    - openplc
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.2

  landing:
    image: mniedermaier1337/landing:${CYBICS_VERSION:-latest}
    build:
      context: ../..
      dockerfile: software/landing/Dockerfile
    restart: always
    ports:
      - 80:80
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ${XDG_RUNTIME_DIR:-/var/run}/docker.sock:/var/run/docker.sock
    develop:
      watch:
        - action: sync+restart
          path: ../../software/landing/app.py
          target: /CybICS/app.py
        - action: sync+restart
          path: ../../software/landing/ctf_config.json
          target: /CybICS/ctf_config.json
        - action: sync+restart
          path: ../../software/landing/modules
          target: /CybICS/modules
        - action: sync+restart
          path: ../../software/landing/templates
          target: /CybICS/templates
        - action: sync
          path: ../../software/landing/static
          target: /CybICS/static
        - action: sync
          path: ../../software/landing/utils
          target: /CybICS/utils
        - action: rebuild
          path: ../../software/landing/requirements.txt
        - action: rebuild
          path: ../../software/landing/Dockerfile
    depends_on:
    - openplc

  engineeringws:
    image: mniedermaier1337/cybics-engineeringws:${CYBICS_VERSION:-latest}
    build:
      context: ../../software
      dockerfile: engineeringWS/Dockerfile
    restart: "no"
    ports:
      - 6080:6080
      - 5901:5901
    depends_on:
    - openplc
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.10
    profiles:
      - engineering
      - full

  cybicsagent:
    image: mniedermaier1337/cybicsagent:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/cybicsagent
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 5001:5000
      - 11434:11434
    environment:
      # Recommended models: tinyllama (fast), phi3:mini (balanced), llama3.2:3b (quality)
      # Model will be downloaded on first use if not already cached
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - OLLAMA_HOST=http://localhost:11434
    volumes:
      - ../../training:/knowledge/training:ro
      - ../../README.md:/knowledge/README.md:ro
      - ../../doc:/knowledge/doc:ro
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.11
    profiles:
      - ai
      - full

  ids:
    image: mniedermaier1337/cybics-ids:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/ids
      dockerfile: Dockerfile
    restart: "no"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    depends_on:
      - openplc
    profiles:
      - ids
      - full

  firmware-updater:
    image: mniedermaier1337/cybics-firmware-updater:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/firmware-updater
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      - stm32
    volumes:
      - firmware_data:/opt/cybics/firmware
      - firmware_keys:/opt/cybics/keys
    environment:
      - UPDATE_SERVER_URL=${UPDATE_SERVER_URL:-http://update.cybics:8080}
      - OPENOCD_HOST=stm32
      - OPENOCD_TELNET_PORT=4444
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.8
    profiles:
      - firmware-server
      - hardware

  update-server:
    image: mniedermaier1337/cybics-update-server:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/update-server
      dockerfile: Dockerfile
    restart: always
    environment:
      - FIRMWARE_VERSION=${FIRMWARE_VERSION:-1.2.1}
      - FIRMWARE_MAC=${FIRMWARE_MAC:-extended-mac}
      - FIRMWARE_PATH=/opt/cybics/update-server/firmware/firmware.bin
    volumes:
      - firmware_data:/opt/cybics/update-server/firmware
    profiles:
      - firmware-server
    ports:
      - 6689:6689
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.9

  stm32:
    image: mniedermaier1337/cybics-stm32:${CYBICS_VERSION:-latest}
    build:
      context: ../../software/stm32
      dockerfile: Dockerfile
    restart: "no"
    ports:
      - 3333:3333
      - 4444:4444
    volumes:
      - firmware_data:/opt/cybics/firmware
    environment:
      - OPENOCD_MODE=${OPENOCD_MODE:-virtual}
    networks:
      virt-cybics:
        ipv4_address: 172.18.0.7
    profiles:
      - hardware

networks:
  virt-cybics:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

volumes:
  firmware_data:
  firmware_keys:
