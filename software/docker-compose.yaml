services:
  hwio:
    image: localhost:5000/cybics-hwio-raspberry:latest
    depends_on:
    - stm32
    - openplc
    restart: always
    privileged: true
    mem_limit: 48m
    volumes:
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
    networks:
      br-cybics:
        ipv4_address: 172.18.0.2

  opcua:
    image: localhost:5000/cybics-opcua:latest
    depends_on:
    - openplc
    restart: always
    mem_limit: 64m
    ports:
      - 4840:4840
    networks:
      br-cybics:
        ipv4_address: 172.18.0.5

  s7com:
    image: localhost:5000/cybics-s7com:latest
    depends_on:
    - openplc
    restart: always
    mem_limit: 32m
    ports:
      - 1102:1102
    networks:
      br-cybics:
        ipv4_address: 172.18.0.6

  openplc:
    image: localhost:5000/cybics-openplc:latest
    restart: always
    mem_limit: 96m
    volumes:
      - /var/run:/var/run
    ports:
      - 44818:44818
      - 20000:20000
      - 8080:8080
      - 502:502
      - 102:102
    networks:
      br-cybics:
        ipv4_address: 172.18.0.3

  fuxa:
    image: localhost:5000/cybics-fuxa:latest
    restart: always
    mem_limit: 80m
    depends_on:
    - openplc
    ports:
      - 1881:1881
    volumes:
      - fuxa_data:/_appdata
    networks:
      br-cybics:
        ipv4_address: 172.18.0.4

  landing:
    image: localhost:5000/cybics-landing:latest
    restart: always
    mem_limit: 64m
    depends_on:
    - openplc
    - fuxa
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      - CYBICS_COMPOSE_DIR=/CybICS
      - CYBICS_COMPOSE_FILE=/CybICS/docker-compose.yaml
      - CYBICS_HEALTHCHECK_HOST=127.0.0.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yaml:/CybICS/docker-compose.yaml:ro

  stm32:
    image: localhost:5000/cybics-stm32:latest
    privileged: true
    restart: always
    mem_limit: 32m
    ports:
      - 3333:3333
    volumes:
      - firmware_data:/opt/cybics/firmware
    networks:
      br-cybics:
        ipv4_address: 172.18.0.7

  firmware-updater:
    image: localhost:5000/cybics-firmware-updater:latest
    restart: unless-stopped
    mem_limit: 64m
    depends_on:
      - stm32
    volumes:
      - firmware_data:/opt/cybics/firmware
      - firmware_keys:/opt/cybics/keys
    environment:
      - UPDATE_SERVER_URL=${UPDATE_SERVER_URL:-http://update.cybics:8080}
      - OPENOCD_HOST=stm32
      - OPENOCD_TELNET_PORT=4444
    networks:
      br-cybics:
        ipv4_address: 172.18.0.8

  update-server:
    image: localhost:5000/cybics-update-server:latest
    restart: unless-stopped
    environment:
      - FIRMWARE_VERSION=${FIRMWARE_VERSION:-1.2.1}
      - FIRMWARE_MAC=${FIRMWARE_MAC:-extended-mac}
      - FIRMWARE_PATH=/opt/cybics/update-server/firmware/firmware.bin
    volumes:
      - firmware_data:/opt/cybics/update-server/firmware
    ports:
      - "6689:6689"
    networks:
      br-cybics:
        ipv4_address: 172.18.0.9

networks:
  br-cybics:
    name: br-cybics
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-cybics
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/24
          gateway: 172.18.0.1

volumes:
  fuxa_data:
  firmware_data:
  firmware_keys:
