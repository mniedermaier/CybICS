name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches: [ main ]

env:
  IMAGES: >-
    cybics-attack-machine:software/attack-machine:software/attack-machine/Dockerfile
    cybicsopenplc:software/OpenPLC:software/OpenPLC/Dockerfile
    cybicsopcua:software/opcua:software/opcua/Dockerfile
    cybicss7com:software/s7com:software/s7com/Dockerfile
    cybicsfuxa:software/FUXA:software/FUXA/Dockerfile
    cybicshwio:software/hwio-virtual:software/hwio-virtual/Dockerfile
    landing:.:software/landing/Dockerfile
    cybics-engineeringws:software:software/engineeringWS/Dockerfile
    cybicsagent:software/cybicsagent:software/cybicsagent/Dockerfile
    cybics-ids:software/ids:software/ids/Dockerfile

jobs:
  # ==== Build amd64 natively on x86 runner ====
  build-amd64:
    name: Build amd64 images
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'mniedermaier/CybICS' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          df -h

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create environment files
        run: .devcontainer/prepare-env.sh

      - name: Extract version metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          GIT_TAG=$(git describe --exact-match --tags 2>/dev/null || echo "")
          echo "git_tag=${GIT_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push amd64 images
        env:
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
          GIT_TAG: ${{ steps.meta.outputs.git_tag }}
        run: |
          for entry in $IMAGES; do
            IFS=':' read -r NAME CONTEXT DOCKERFILE <<< "$entry"
            IMAGE="mniedermaier1337/${NAME}"

            TAG_ARGS="-t ${IMAGE}:${SHA_SHORT}-amd64 -t ${IMAGE}:latest-amd64"
            if [ -n "$GIT_TAG" ]; then
              VERSION_TAG=${GIT_TAG#v}
              TAG_ARGS="${TAG_ARGS} -t ${IMAGE}:${VERSION_TAG}-amd64"
            fi

            echo "::group::Building ${NAME} (amd64)"
            docker buildx build \
              --platform linux/amd64 \
              ${TAG_ARGS} \
              --push \
              -f ${DOCKERFILE} \
              ${CONTEXT}
            echo "::endgroup::"
          done

  # ==== Build arm64 natively on ARM runner ====
  build-arm64:
    name: Build arm64 images
    runs-on: ubuntu-24.04-arm
    if: ${{ github.repository == 'mniedermaier/CybICS' }}
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          df -h

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create environment files
        run: .devcontainer/prepare-env.sh

      - name: Extract version metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          GIT_TAG=$(git describe --exact-match --tags 2>/dev/null || echo "")
          echo "git_tag=${GIT_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push arm64 images
        env:
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
          GIT_TAG: ${{ steps.meta.outputs.git_tag }}
        run: |
          for entry in $IMAGES; do
            IFS=':' read -r NAME CONTEXT DOCKERFILE <<< "$entry"
            IMAGE="mniedermaier1337/${NAME}"

            TAG_ARGS="-t ${IMAGE}:${SHA_SHORT}-arm64 -t ${IMAGE}:latest-arm64"
            if [ -n "$GIT_TAG" ]; then
              VERSION_TAG=${GIT_TAG#v}
              TAG_ARGS="${TAG_ARGS} -t ${IMAGE}:${VERSION_TAG}-arm64"
            fi

            echo "::group::Building ${NAME} (arm64)"
            docker buildx build \
              --platform linux/arm64 \
              ${TAG_ARGS} \
              --push \
              -f ${DOCKERFILE} \
              ${CONTEXT}
            echo "::endgroup::"
          done

  # ==== Create multi-arch manifests ====
  create-manifests:
    name: Create multi-arch manifests
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: ${{ github.repository == 'mniedermaier/CybICS' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          GIT_TAG=$(git describe --exact-match --tags 2>/dev/null || echo "")
          echo "git_tag=${GIT_TAG}" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifests
        env:
          SHA_SHORT: ${{ steps.meta.outputs.sha_short }}
          GIT_TAG: ${{ steps.meta.outputs.git_tag }}
        run: |
          for entry in $IMAGES; do
            IFS=':' read -r NAME CONTEXT DOCKERFILE <<< "$entry"
            IMAGE="mniedermaier1337/${NAME}"

            echo "::group::Creating manifest for ${NAME}"

            # Create 'latest' manifest
            docker buildx imagetools create \
              -t ${IMAGE}:latest \
              ${IMAGE}:latest-amd64 \
              ${IMAGE}:latest-arm64

            # Create SHA-tagged manifest
            docker buildx imagetools create \
              -t ${IMAGE}:${SHA_SHORT} \
              ${IMAGE}:${SHA_SHORT}-amd64 \
              ${IMAGE}:${SHA_SHORT}-arm64

            # Create version-tagged manifest if this is a release
            if [ -n "$GIT_TAG" ]; then
              VERSION_TAG=${GIT_TAG#v}
              docker buildx imagetools create \
                -t ${IMAGE}:${VERSION_TAG} \
                ${IMAGE}:${VERSION_TAG}-amd64 \
                ${IMAGE}:${VERSION_TAG}-arm64
            fi

            echo "::endgroup::"
          done
